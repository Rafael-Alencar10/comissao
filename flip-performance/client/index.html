<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script type="module">
    // Load Umami analytics only when endpoint looks like an external URL
    // and is not the same origin as the app (to avoid loading index.html as script).
    (function () {
      const raw = "%VITE_ANALYTICS_ENDPOINT%".trim();
      const websiteId = "%VITE_ANALYTICS_WEBSITE_ID%".trim();
      if (!raw || !websiteId) return;
      // normalize
      const endpoint = raw.replace(/\/+$/, "");
      // must be an absolute http(s) URL
      if (!/^https?:\/\//i.test(endpoint)) return;
      try {
        const origin = window.location.origin.replace(/:\d+$/, "");
        const epOrigin = (new URL(endpoint)).origin.replace(/:\d+$/, "");
        if (epOrigin === origin) {
          // endpoint points to same origin — skip in dev to avoid fetching index.html
          return;
        }
      } catch (e) {
        return;
      }
      try {
        const script = document.createElement("script");
        script.defer = true;
        script.src = endpoint + "/umami";
        script.setAttribute("data-website-id", websiteId);
        document.head.appendChild(script);
      } catch (e) {
        // ignore
      }
    })();
  </script>
</body>

</html>
